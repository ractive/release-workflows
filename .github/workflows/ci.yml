# Self-check: lint this repo's own workflow files with actionlint (syntax +
# shellcheck) and zizmor (GitHub Actions security static analysis) on every
# push and pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Download actionlint
        run: |
          set -euo pipefail
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/3795ba2f6cb243eeca54c9d22e5c531cb9dcfb4a/scripts/download-actionlint.bash) 1.7.12
        # Pinned download script commit + pinned actionlint version for
        # reproducibility. See https://github.com/rhysd/actionlint releases.

      - name: Run actionlint
        run: ./actionlint -color

  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run zizmor
        # Version pinned via `--from zizmor==<version>`; suppressions (if
        # any) live in the committed zizmor.yml, each with a comment
        # explaining why it's a deliberate exception and not a blanket skip.
        run: uvx --from zizmor==1.26.1 zizmor --config zizmor.yml .github/workflows/
