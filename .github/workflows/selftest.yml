# End-to-end integration test for release.yml. Calls the reusable workflow
# from THIS repo (uses: ./.github/workflows/release.yml is valid for
# workflow_call and runs at the triggering commit's SHA), pointed at the
# fixture crate under testdata/fixture-cli, in dry-run mode. This exercises
# the real build/test/archive/SBOM/deb-rpm/SHA256SUMS/dry-run-summary code
# paths on every PR without touching crates.io, Homebrew, Scoop, winget, or
# any app repo.
name: Selftest

on:
  push:
    branches: [main]
  pull_request:

# contents: write, not read: GitHub validates reusable-workflow permissions
# EAGERLY at startup â€” the called release job requests contents: write, and
# the caller must grant at least that even though dry-run skips the job
# (verified: a contents: read grant produces startup_failure). Note fork PRs
# get write silently downgraded to read, so selftest would startup-fail for
# forks; acceptable for this single-maintainer infra repo.
permissions:
  contents: write

concurrency:
  group: selftest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    uses: ./.github/workflows/release.yml
    permissions:
      contents: write
    with:
      bin-name: fixture-cli
      version-package: fixture-cli
      workspace-dir: testdata/fixture-cli
      dry-run: true
      enable-sbom: true
      enable-attestation: false
      enable-linux-packages: true
      linux-package-crate: fixture-cli
      # Deliberately multi-line: guards the eval-based execution of this
      # input (a bare ${VAR} expansion once flattened the newlines into one
      # giant argument list â€” real bug caught by hoppy's first dry-run).
      pre-package-command: |
        mkdir -p extras
        echo "target=$TARGET cross=$CROSS version=$VERSION bin=$BIN_PATH" > extras/buildinfo.txt
        if [ "$CROSS" != "true" ]; then
          # Validates that BIN_PATH resolves to a runnable binary on native
          # targets (including .exe resolution on Windows).
          "$BIN_PATH" --version >> extras/buildinfo.txt
        fi
      extra-archive-paths: extras
      # One target per distinct code path: native Linux build+test, a cross
      # (containerized) Linux build to exercise the cross/Cross.toml path,
      # a native macOS build, and the Windows zip-archive path.
      targets: >-
        [
          {"target": "x86_64-unknown-linux-gnu",  "os": "ubuntu-latest",  "cross": false, "run_tests": true},
          {"target": "x86_64-unknown-linux-musl", "os": "ubuntu-latest",  "cross": true,  "run_tests": true},
          {"target": "aarch64-apple-darwin",      "os": "macos-latest",  "cross": false, "run_tests": true},
          {"target": "x86_64-pc-windows-msvc",    "os": "windows-latest", "cross": false, "run_tests": true}
        ]
